name: Notify Overdue Checkouts

on:
  schedule:
    # كل يوم 06:00 UTC (= 09:00 توقيت الرياض)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js@^2.45.0 --no-save --silent

      - name: Send overdue notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SITE_URL: https://sraj-warehouse.vercel.app
        run: node scripts/notify-overdue.mjs
