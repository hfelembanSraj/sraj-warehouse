name: Daily Backup

on:
  schedule:
    # كل يوم 03:00 UTC (= 06:00 توقيت الرياض)
    - cron: '0 3 * * *'
  workflow_dispatch: # تشغيل يدوي من واجهة GitHub

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js@^2.45.0 --no-save --silent

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup.mjs

      - name: Stash backup file
        run: |
          mkdir -p /tmp/sraj-backup
          cp backups/*.json /tmp/sraj-backup/

      - name: Push to backups branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # حاول جلب فرع backups إن كان موجوداً
          if git ls-remote --exit-code --heads origin backups; then
            echo "✓ backups branch exists — checking out"
            git fetch origin backups:backups
            git checkout backups
          else
            echo "✓ Creating new orphan backups branch"
            git checkout --orphan backups
            git rm -rf . 2>/dev/null || true
            git clean -fdx
          fi

          # استعد ملف النسخة الاحتياطية
          mkdir -p backups
          cp /tmp/sraj-backup/*.json backups/

          # احذف ما تجاوز 90 يوماً
          cd backups
          ls -1 *.json 2>/dev/null | sort -r | tail -n +91 | xargs -r rm -v
          cd ..

          # ارفع
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "🗄 Backup ${DATE}"
            git push origin backups
            echo "✅ Backup pushed for ${DATE}"
          fi
