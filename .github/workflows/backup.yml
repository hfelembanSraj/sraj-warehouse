name: Daily Backup

on:
  schedule:
    # كل يوم 03:00 UTC (= 06:00 توقيت الرياض)
    - cron: '0 3 * * *'
  workflow_dispatch: # يسمح بالتشغيل اليدوي من واجهة GitHub

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backups branch
        uses: actions/checkout@v4
        with:
          ref: backups
          fetch-depth: 1
        continue-on-error: true

      - name: Init backups branch if missing
        run: |
          if [ ! -d ".git" ]; then
            git init
            git remote add origin "https://github.com/${{ github.repository }}.git"
            git checkout -b backups
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js@^2.45.0 --no-save

      - name: Get backup script from main
        run: |
          curl -sSL "https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/backup.mjs" -o backup.mjs

      - name: Run backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node backup.mjs

      - name: Prune old backups (keep last 90 days)
        run: |
          if [ -d backups ]; then
            cd backups
            ls -1 *.json 2>/dev/null | sort -r | tail -n +91 | xargs -r rm -v
            cd ..
          fi

      - name: Commit and push
        run: |
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗄 Backup $(date -u +%Y-%m-%d)"
            git push origin backups
          fi
